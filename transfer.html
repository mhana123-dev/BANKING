<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank - تحويل الأموال</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="form-container transfer-box">
        <a href="dashboard.html" class="back-link">⬅️ العودة للوحة التحكم</a>
        <h2>💸 نموذج تحويل أموال آمن</h2>
        
        <div id="transfer-alert" class="alert hidden"></div>

        <form id="transferForm">
            <div class="form-group">
                <label>رقم حساب المستلم (ID الخاص به أو اسم المستخدم)</label>
                <input type="text" id="receiver-id" required placeholder="أدخل معرف المستلم">
            </div>

            <div class="form-group">
                <label>المبلغ المراد تحويله ($)</label>
                <input type="number" id="transfer-amount" min="1" step="0.01" required placeholder="0.00">
            </div>

            <div class="form-group">
                <label>سبب التحويل</label>
                <select id="transfer-reason">
                    <option value="شخصي">مصاريف شخصية / عائلية</option>
                    <option value="عمل">عمل تجاري / خدمات</option>
                    <option value="أخرى">أسباب أخرى</option>
                </select>
            </div>

            <button type="submit" class="btn-primary success-btn">تأكيد وتنفيذ عملية التحويل</button>
        </form>
    </div>
    
    <script src="js/transfer.js"></script>
</body>
</html>
